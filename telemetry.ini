; ============================================================
; Telemetry 配置文件
; 放置于 exe 同目录或工作目录, init() 会自动发现
; 未指定的项使用默认值, 注释行以 ; 或 # 开头
; ============================================================

; 卡顿阈值 (毫秒), 帧耗时超过此值视为卡顿
; stutter_threshold_ms = 33.3

; 后台线程排空间隔 (毫秒)
; drain_interval_ms = 5

; 输出目录, 存放 Chrome Trace JSON 文件
; output_dir = telemetry_out

; 是否自动导出 (true/false)
; auto_export = true

; 事件缓冲区最大容量
; max_events = 500000

; ---- StutterOnly 模式 ----
; 仅保留卡顿前后窗口内的数据, 大幅减少输出体积
; stutter_only = false

; 卡顿前捕获窗口 (毫秒)
; stutter_capture_before_ms = 100.0

; 卡顿后捕获窗口 (毫秒)
; stutter_capture_after_ms = 50.0

; ---- 滚动导出 ----
; 自动导出间隔 (秒), 0 = 关闭滚动导出
; auto_export_interval_sec = 0

; 最大保留文件数
; max_trace_files = 10

; 单次上传预算 (字节)
; upload_budget_bytes = 2097152
